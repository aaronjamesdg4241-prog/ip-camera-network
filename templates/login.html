<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login</title>
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  form { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
  input { display: block; width: 93%; margin-bottom: 10px; padding: 8px; }
  button { width: 100%; padding: 10px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  button:hover { background: #0056b3; }
  .flash-messages { color: #d9534f; margin-bottom: 15px; font-size: 14px; text-align: center; }
</style>
</head>
<body>

<form method="POST">
  <h2>Login</h2>
  
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash-messages">
        {% for message in messages %}
          <p>{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <input type="text" name="username" placeholder="Username" required />
  <input type="password" name="password" placeholder="Password" required />
  <button type="submit">Login</button>
  <p style="font-size: 12px; text-align: center; margin-top: 15px;">
    Don't have an account? <a href="{{ url_for('register') }}" style="color: #007bff;">Register here</a>
  </p>
</form>
</body>
</html>
