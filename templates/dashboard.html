<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Dashboard Control Panel</title>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 40px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 24px; }
        h1, h2 { margin-top: 0; }
        .btn-refresh { background-color: #3b82f6; color: white; border: none; padding: 12px 24px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .btn-refresh:hover { background-color: #2563eb; }
        .stream-frame { border: 3px solid #334155; border-radius: 12px; display: inline-block; overflow: hidden; background: #020617; max-width: 100%; }
        .logout-link { color: #f43f5e; text-decoration: none; font-weight: 600; float: right; }
    </style>
</head>
<body>

<div class="container">
    <a href="{{ url_for('logout') }}" class="logout-link">Log Out</a>
    <h1>Welcome back, Control Center</h1>
    <hr style="border-color: #334155; margin-bottom: 30px;">

    <div class="card" style="text-align: center;">
        <h2>🎥 Live System Monitor Feed</h2>
        
        <div class="stream-frame">
            <img id="security-stream" src="{{ url_for('video_feed') }}" alt="Live Security Camera Feed" width="640" height="480" style="display: block; max-width: 100%; height: auto;">
        </div>
        
        <div style="margin-top: 20px;">
            <button id="refresh-stream-btn" class="btn-refresh">
                🔄 Refresh Camera Connection
            </button>
        </div>
        
        <p style="color: #94a3b8; margin-top: 12px; font-size: 14px;">
            Tracking feed safely bridged from system endpoint configurations.
        </p>
    </div>
</div>

<script>
    // Handles independent frame reset without triggering an entire layout page refresh
    document.getElementById('refresh-stream-btn').addEventListener('click', function() {
        const streamImg = document.getElementById('security-stream');
        const baseStreamUrl = "{{ url_for('video_feed') }}";
        
        // Appending unique timestamp forces the browser to drop its old connection buffer
        streamImg.src = baseStreamUrl + "?t=" + new Date().getTime();
        console.log("Camera data stream pipe reinitialized.");
    });
</script>

</body>
</html>
